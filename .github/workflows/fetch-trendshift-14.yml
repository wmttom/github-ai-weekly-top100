name: Temporary fetch Trendshift ranges

on:
  push:
    paths:
      - '.github/workflows/fetch-trendshift-14.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and parse exact Trendshift range pages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tmp/trendshift
          python -m pip install --quiet beautifulsoup4 requests
          python - <<'PY'
          import csv, json, re, requests, traceback
          from pathlib import Path
          from bs4 import BeautifulSoup

          BASE='https://trendshift.io/github-trending-repositories?trending-range={}&trending-limit=100'
          HEADERS={'User-Agent':'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36','Accept':'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'}
          repo_re=re.compile(r'^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$')
          num_re=re.compile(r'^[0-9]+(?:\.[0-9]+)?[kKmM]?$')
          rank_re=re.compile(r'^\d+$')

          def parse_range(days):
              url=BASE.format(days)
              r=requests.get(url,headers=HEADERS,timeout=120); r.raise_for_status(); html=r.text
              Path(f'tmp/trendshift/{days}.html').write_text(html,encoding='utf-8')
              soup=BeautifulSoup(html,'html.parser')
              for tag in soup(['script','style','noscript','svg']): tag.decompose()
              lines=[]
              for x in soup.get_text('\n',strip=True).splitlines():
                  x=' '.join(x.split())
                  if x and (not lines or x!=lines[-1]): lines.append(x)
              Path(f'tmp/trendshift/{days}.txt').write_text('\n'.join(lines)+'\n',encoding='utf-8')
              start=lines.index('The repositories have continued to trend on GitHub Trending')+1
              rows=[]; i=start
              while i<len(lines):
                  if not repo_re.match(lines[i]): i+=1; continue
                  if i+6>=len(lines) or not num_re.match(lines[i+1]) or not num_re.match(lines[i+2]): i+=1; continue
                  repo=lines[i]; stars=lines[i+1]; forks=lines[i+2]; j=i+3
                  if lines[j] != 'Featured on GitHub Trending': i+=1; continue
                  if not rank_re.match(lines[j+1]) or lines[j+2] != 'times': i+=1; continue
                  appearances=int(lines[j+1]); period=lines[j+3]; k=j+4
                  expected=('of today.' if days==1 else f'over past {days} days.')
                  if period != expected: i+=1; continue
                  new_flag=False
                  if k+1<len(lines) and lines[k]=='New' and rank_re.match(lines[k+1]): new_flag=True; k+=2
                  if k<len(lines) and lines[k]=='Mentioned on': k+=1
                  desc_parts=[]; tags=[]
                  while k<len(lines):
                      line=lines[k]
                      if repo_re.match(line): break
                      if rank_re.match(line) and k+1<len(lines) and repo_re.match(lines[k+1]): break
                      if line=='#':
                          if k+1<len(lines) and lines[k+1] != '#' and not repo_re.match(lines[k+1]):
                              tags.append(lines[k+1]); k+=2; continue
                          k+=1; continue
                      if not rank_re.match(line): desc_parts.append(line)
                      k+=1
                  rows.append({'range_days':days,'rank':len(rows)+1,'repo':repo,'stars':stars,'forks':forks,'appearances':appearances,'new':new_flag,'description':' '.join(desc_parts).strip(),'tags':tags,'url':url})
                  i=k
              return rows,len(html.encode('utf-8')),len(lines)

          all_rows=[]; status={}
          for days in (14,7,1):
              try:
                  rows,size,line_count=parse_range(days); all_rows.extend(rows)
                  status[str(days)]={'ok':len(rows)>0,'rows':len(rows),'html_bytes':size,'text_lines':line_count}
              except Exception as e:
                  status[str(days)]={'ok':False,'rows':0,'error':repr(e),'traceback':traceback.format_exc()[-3000:]}
          Path('tmp/trendshift/ranges.json').write_text(json.dumps(all_rows,ensure_ascii=False,indent=2),encoding='utf-8')
          with open('tmp/trendshift/ranges.csv','w',newline='',encoding='utf-8') as f:
              fields=['range_days','rank','repo','stars','forks','appearances','new','description','tags','url']
              w=csv.DictWriter(f,fieldnames=fields); w.writeheader()
              for row in all_rows:
                  row=row.copy(); row['tags']=' | '.join(row['tags']); w.writerow(row)
          Path('tmp/trendshift/status.json').write_text(json.dumps(status,ensure_ascii=False,indent=2),encoding='utf-8')
          print(json.dumps(status,indent=2))
          PY
      - name: Commit fetched data
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tmp/trendshift
          git commit -m 'Temporary: parse Trendshift 14/7/1-day data' || true
          git push
