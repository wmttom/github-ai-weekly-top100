name: Temporary fetch Trendshift 14-day

on:
  push:
    paths:
      - '.github/workflows/fetch-trendshift-14.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch exact Trendshift 14-day page
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tmp
          URL='https://trendshift.io/github-trending-repositories?trending-range=14&trending-limit=100'
          curl --fail --location --compressed --retry 3 --retry-all-errors \
            --connect-timeout 20 --max-time 120 \
            -A 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36' \
            -H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' \
            "$URL" -o tmp/trendshift-14.html
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class TextParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.parts=[]
                  self.skip=0
              def handle_starttag(self, tag, attrs):
                  if tag in {'script','style','noscript','svg'}:
                      self.skip += 1
                  if tag in {'p','div','li','h1','h2','h3','h4','br','article','section'} and not self.skip:
                      self.parts.append('\n')
              def handle_endtag(self, tag):
                  if tag in {'script','style','noscript','svg'} and self.skip:
                      self.skip -= 1
                  if tag in {'p','div','li','h1','h2','h3','h4','article','section'} and not self.skip:
                      self.parts.append('\n')
              def handle_data(self, data):
                  if not self.skip:
                      text=' '.join(data.split())
                      if text:
                          self.parts.append(text+' ')

          raw=Path('tmp/trendshift-14.html').read_text(encoding='utf-8', errors='replace')
          parser=TextParser(); parser.feed(raw)
          lines=[]
          for line in ''.join(parser.parts).splitlines():
              line=' '.join(line.split())
              if line and (not lines or line != lines[-1]):
                  lines.append(line)
          text='\n'.join(lines)+'\n'
          Path('tmp/trendshift-14.txt').write_text(text, encoding='utf-8')
          ok=('past 14 days' in text and 'GitHub trending repositories' in text and len(text) > 5000)
          Path('tmp/trendshift-14-status.txt').write_text(
              f'ok={str(ok).lower()}\nhtml_bytes={len(raw.encode("utf-8"))}\ntext_chars={len(text)}\n',
              encoding='utf-8')
          if not ok:
              raise SystemExit('Fetched response did not contain a valid 14-day Trendshift ranking')
          PY
      - name: Commit fetched data
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tmp/trendshift-14.html tmp/trendshift-14.txt tmp/trendshift-14-status.txt
          git commit -m 'Temporary: fetch Trendshift 14-day data'
          git push
